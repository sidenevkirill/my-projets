<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VK Moosic — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #edeef0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { max-width: 480px; width: 100%; }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: #2787f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon .material-symbols-outlined { font-size: 32px; color: white; }
        .logo h1 { font-size: 24px; font-weight: 600; color: #1e1e1e; margin-bottom: 4px; }
        .logo p { font-size: 14px; color: #6c6c6c; }
        .vk-login-btn {
            width: 100%;
            background: #2787f5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .vk-login-btn:hover { background: #1e6fd4; }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e3e6;
        }
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            font-size: 13px;
            color: #6c6c6c;
        }
        .token-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e1e3e6;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 16px;
            outline: none;
            background: white;
            color: #1e1e1e;
        }
        .token-input:focus {
            border-color: #2787f5;
            box-shadow: 0 0 0 2px rgba(39, 135, 245, 0.2);
        }
        .btn-login {
            width: 100%;
            background: #e1e3e6;
            color: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-login:hover { background: #d0d2d6; }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #6c6c6c;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }
        .info-box {
            background: #f3f4f6;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-box .material-symbols-outlined { color: #2787f5; font-size: 24px; }
        .info-box-text { flex: 1; font-size: 13px; color: #4b5563; line-height: 1.4; }
        .info-box-text a { color: #2787f5; text-decoration: none; font-weight: 500; }
        .token-hint { margin-top: 8px; font-size: 12px; color: #6c6c6c; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <span class="material-symbols-outlined">music_note</span>
                </div>
                <h1>VK Moosic</h1>
                <p>Слушайте музыку ВКонтакте</p>
            </div>
            
            <div class="info-box">
                <span class="material-symbols-outlined">info</span>
                <div class="info-box-text">
                    Войдите через ВКонтакте или введите токен вручную.<br>
                    <a href="#" onclick="showInstructions(); return false;">Как получить токен?</a>
                </div>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <!-- Кнопка входа через ВК -->
            <button class="vk-login-btn" id="vkLoginBtn">
                <span class="material-symbols-outlined">login</span>
                Войти через ВКонтакте
            </button>
            
            <div class="divider">
                <span>или введите токен вручную</span>
            </div>
            
            <form id="tokenForm">
                <input type="text" name="token" class="token-input" id="tokenInput" placeholder="vk1.a.xxxxxxxxxxx..." autocomplete="off">
                <button type="submit" class="btn-login">Войти по токену</button>
            </form>
            
            <div class="footer">
                <span class="material-symbols-outlined">security</span>
                Токен хранится только в вашем браузере
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMessageDiv = document.getElementById('errorMessage');
        
        function showError(msg) {
            errorMessageDiv.textContent = msg;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
            }, 5000);
        }
        
        function showInstructions() {
            alert("Как получить токен ВКонтакте:\n\n1. Перейдите на сайт: vkhost.github.io\n2. Выберите приложение 'Kate Mobile' или 'VK Music'\n3. Отметьте права доступа: Аудиозаписи (audio)\n4. Нажмите 'Получить токен'\n5. Скопируйте access_token (начинается с vk1.a.)\n6. Вставьте его в поле выше");
        }
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        async function sendTokenToServer(token) {
            showLoading();
            try {
                const response = await fetch('/auth/set-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'token=' + encodeURIComponent(token)
                });
                
                if (response.redirected) {
                    window.location.href = response.url;
                } else if (response.ok) {
                    window.location.href = '/';
                } else {
                    hideLoading();
                    const error = await response.text();
                    showError('Ошибка: ' + error);
                }
            } catch (err) {
                console.error('Ошибка:', err);
                hideLoading();
                showError('Ошибка соединения: ' + err.message);
            }
        }
        
        // Прямой OAuth вход через ВК
        document.getElementById('vkLoginBtn').addEventListener('click', function() {
            const clientId = 54533272;
            const redirectUri = window.location.origin + '/auth/vk-callback';
            const scope = 'audio,offline';
            const vkAuthUrl = `https://oauth.vk.com/authorize?client_id=${clientId}&display=page&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}&response_type=code&v=5.131`;
            
            window.location.href = vkAuthUrl;
        });
        
        // Обработка формы токена
        document.getElementById('tokenForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const token = document.getElementById('tokenInput').value.trim();
            if (token) {
                sendTokenToServer(token);
            } else {
                showError('Введите токен');
            }
        });
    </script>
</body>
</html>
