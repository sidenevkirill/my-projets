<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VK Moosic — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }
        
        .logo-icon .material-symbols-outlined {
            font-size: 48px;
            color: white;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .vk-login-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        #vkIdOneTap {
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }
        
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            font-size: 13px;
            color: #9ca3af;
        }
        
        .token-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 16px;
            outline: none;
            transition: all 0.2s;
        }
        
        .token-input:focus {
            border-color: #667eea;
        }
        
        .btn-token {
            width: 100%;
            background: #6b7280;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-token:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            .logo h1 {
                font-size: 24px;
            }
        }
        
        @media (prefers-color-scheme: dark) {
            .login-card {
                background: rgba(31, 41, 55, 0.95);
            }
            .logo p {
                color: #9ca3af;
            }
            .divider span {
                background: #1f2937;
                color: #6b7280;
            }
            .token-input {
                background: #374151;
                border-color: #4b5563;
                color: white;
            }
            .token-input::placeholder {
                color: #9ca3af;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <span class="material-symbols-outlined">music_note</span>
                </div>
                <h1>VK Moosic</h1>
                <p>Войдите, чтобы слушать музыку</p>
            </div>
            
            <div class="vk-login-container">
                <div id="vkIdOneTap"></div>
            </div>
            
            <div class="divider">
                <span>или введите токен вручную</span>
            </div>
            
            <form method="POST" action="/auth/set-token" id="tokenForm">
                <input type="text" name="token" class="token-input" placeholder="Введите access_token" autocomplete="off">
                <button type="submit" class="btn-token">Войти по токену</button>
            </form>
            
            <div class="footer">
                <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">security</span>
                Токен хранится только в вашем браузере
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        async function exchangeCodeForToken(code, deviceId) {
            showLoading();
            try {
                const response = await fetch('/auth/exchange-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, device_id: deviceId })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.error('Ошибка:', data.error);
                    alert('Ошибка авторизации: ' + data.error);
                    hideLoading();
                    return;
                }
                
                if (data.success) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Ошибка соединения: ' + err.message);
                hideLoading();
            }
        }
        
        if (window.VKIDSDK) {
            const VKID = window.VKIDSDK;
            
            VKID.Config.init({
                app: 54529729,
                redirectUrl: 'https://my-projets.onrender.com/',
                responseMode: VKID.ConfigResponseMode.Callback,
                source: VKID.ConfigSource.LOWCODE,
                scope: 'audio,offline',
            });
            
            const oneTap = new VKID.OneTap();
            
            oneTap.render({
                container: document.getElementById('vkIdOneTap'),
                showAlternativeLogin: true
            })
            .on(VKID.WidgetEvents.ERROR, function(error) {
                console.error('VK ID Error:', error);
            })
            .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, function(payload) {
                const code = payload.code;
                const deviceId = payload.device_id;
                exchangeCodeForToken(code, deviceId);
            });
        } else {
            console.error('VKIDSDK not loaded');
            document.getElementById('vkIdOneTap').innerHTML = '<p style="color: red;">Ошибка загрузки VK ID</p>';
        }
        
        document.getElementById('tokenForm').addEventListener('submit', function() {
            showLoading();
        });
    </script>
</body>
</html>
