<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VK Moosic — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #edeef0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
        }
        
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: #2787f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        
        .logo-icon .material-symbols-outlined {
            font-size: 32px;
            color: white;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1e1e1e;
            margin-bottom: 4px;
        }
        
        .logo p {
            font-size: 14px;
            color: #6c6c6c;
        }
        
        .vk-login-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            min-height: 48px;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e3e6;
        }
        
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            font-size: 13px;
            color: #6c6c6c;
        }
        
        .token-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e1e3e6;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 16px;
            outline: none;
            transition: all 0.2s;
            background: white;
            color: #1e1e1e;
        }
        
        .token-input:focus {
            border-color: #2787f5;
            box-shadow: 0 0 0 2px rgba(39, 135, 245, 0.2);
        }
        
        .token-input::placeholder {
            color: #9ca3af;
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }
        
        .btn-token {
            width: 100%;
            background: #2787f5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-token:hover {
            background: #1e6fd4;
        }
        
        .btn-token:active {
            transform: scale(0.98);
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #6c6c6c;
        }
        
        .footer .material-symbols-outlined {
            font-size: 14px;
            vertical-align: middle;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .token-hint {
            font-size: 12px;
            color: #6c6c6c;
            margin-top: -12px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .token-hint a {
            color: #2787f5;
            text-decoration: none;
        }
        
        .token-hint a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
            }
            .logo h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <span class="material-symbols-outlined">music_note</span>
                </div>
                <h1>VK Moosic</h1>
                <p>Слушайте музыку ВКонтакте</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="vk-login-container">
                <div id="vkIdOneTap"></div>
            </div>
            
            <div class="divider">
                <span>или войдите по токену</span>
            </div>
            
            <form method="POST" action="/auth/set-token" id="tokenForm">
                <input type="text" name="token" class="token-input" placeholder="vk1.a.xxxxxxxxxxx..." autocomplete="off">
                <button type="submit" class="btn-token">Войти</button>
            </form>
            
            <div class="token-hint">
                <a href="#" onclick="showInstructions(); return false;">Как получить токен?</a>
            </div>
            
            <div class="footer">
                <span class="material-symbols-outlined">security</span>
                Токен хранится только в вашем браузере
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMessageDiv = document.getElementById('errorMessage');
        
        function showError(msg) {
            errorMessageDiv.textContent = msg;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
            }, 5000);
        }
        
        function showInstructions() {
            alert("Как получить токен ВКонтакте:\n\n1. Перейдите на сайт: vkhost.github.io\n2. Выберите приложение 'Kate Mobile' или 'VK Music'\n3. Отметьте права доступа: Аудиозаписи (audio)\n4. Нажмите 'Получить токен'\n5. Скопируйте access_token (начинается с vk1.a.)\n6. Вставьте его в поле выше");
        }
        
        function showLoading() {
            loadingOverlay.classList.add('active');
        }
        
        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }
        
        async function sendTokenToServer(token) {
            showLoading();
            try {
                const response = await fetch('/auth/set-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'token=' + encodeURIComponent(token)
                });
                
                if (response.redirected) {
                    window.location.href = response.url;
                } else if (response.ok) {
                    const data = await response.text();
                    if (data.includes('success') || data.includes('redirect')) {
                        window.location.href = '/';
                    } else {
                        hideLoading();
                        showError('Ошибка авторизации на сервере');
                    }
                } else {
                    hideLoading();
                    const error = await response.text();
                    showError('Ошибка: ' + error);
                }
            } catch (err) {
                console.error('Ошибка:', err);
                hideLoading();
                showError('Ошибка соединения: ' + err.message);
            }
        }
        
        async function exchangeCodeAndLogin(code, deviceId) {
            showLoading();
            try {
                const response = await fetch('/auth/exchange-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, device_id: deviceId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    hideLoading();
                    showError('Ошибка авторизации: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch (err) {
                console.error('Ошибка:', err);
                hideLoading();
                showError('Ошибка соединения: ' + err.message);
            }
        }
        
        if (window.VKIDSDK) {
            const VKID = window.VKIDSDK;
            
            VKID.Config.init({
                app: 54533272,
                redirectUrl: window.location.origin + '/auth/vk-callback',
                responseMode: VKID.ConfigResponseMode.Callback,
                source: VKID.ConfigSource.LOWCODE,
                scope: 'audio,offline',
            });
            
            const floatingOneTap = new VKID.FloatingOneTap();
            
            floatingOneTap.render({
                appName: 'VKMoosic',
                showAlternativeLogin: true
            })
            .on(VKID.WidgetEvents.ERROR, function(error) {
                console.error('VK ID Error:', error);
                showError('Ошибка VK ID: ' + (error.message || 'Неизвестная ошибка'));
            })
            .on(VKID.FloatingOneTapInternalEvents.LOGIN_SUCCESS, function(payload) {
                const code = payload.code;
                const deviceId = payload.device_id;
                
                VKID.Auth.exchangeCode(code, deviceId)
                    .then(function(data) {
                        if (data.access_token) {
                            sendTokenToServer(data.access_token);
                        } else if (data.email) {
                            sendTokenToServer(data.access_token);
                        } else {
                            exchangeCodeAndLogin(code, deviceId);
                        }
                    })
                    .catch(function(error) {
                        console.error('Exchange error:', error);
                        exchangeCodeAndLogin(code, deviceId);
                    });
            });
        } else {
            console.error('VKIDSDK not loaded');
            document.getElementById('vkIdOneTap').innerHTML = '<p style="color: red;">Ошибка загрузки VK ID</p>';
        }
        
        document.getElementById('tokenForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const token = document.querySelector('input[name="token"]').value.trim();
            if (token) {
                sendTokenToServer(token);
            } else {
                showError('Введите токен');
            }
        });
    </script>
</body>
</html>
